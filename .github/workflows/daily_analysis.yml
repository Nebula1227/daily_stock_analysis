name: Double-Strategy-Stock-Monitor

on:
  # 开盘前启动（北京时间9:20）
  schedule:
    - cron: '20 1 * * 1-5'
  # 手动触发
  workflow_dispatch:

jobs:
  stock-monitor-job:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      HOLD_STOCK_LIST: ${{ secrets.HOLD_STOCK_LIST }}
      WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}

    steps:
      - name: 1. 拉取代码仓库
        uses: actions/checkout@v4

      - name: 2. 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 3. 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas

      - name: 4. 启动稳健版监控（后台运行）
        run: python main.py &

      - name: 5. 启动激进版监控
        run: python main_aggr.py

      - name: 6. 上传运行日志
        uses: actions/upload-artifact@v4
        with:
          name: double-strategy-logs
          path: |
            *.log
          retention-days: 7
