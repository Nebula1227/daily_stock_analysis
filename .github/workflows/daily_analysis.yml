name: Double-Strategy-Stock-Monitor

on:
  schedule:
    - cron: '20 1 * * 1-5'
  workflow_dispatch:

jobs:
  stock-monitor-job:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      HOLD_STOCK_LIST: ${{ secrets.HOLD_STOCK_LIST }}
      WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}

    steps:
      - name: 1. 拉取代码仓库
        uses: actions/checkout@v4

      - name: 2. 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 3. 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas

      - name: 4. 启动整合版监控（包含稳健+激进+早晚盘+持仓分析）
        run: python main.py

      - name: 5. 上传运行日志
        uses: actions/upload-artifact@v4
        with:
          name: stock-monitor-logs
          path: |
            *.log
          retention-days: 7
