# GitHub Actions 股票监控工作流（东方财富版，0积分）
name: Stock Monitor (DFCF Free Version)

# 触发规则：手动 + 周一到周五9:20自动触发
on:
  workflow_dispatch:
  schedule:
    - cron: '20 1 * * 1-5'  # 北京时间9:20运行

jobs:
  run-stock-monitor:
    runs-on: ubuntu-latest
    steps:
      # 拉取代码
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 配置Python环境
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # 安装基础依赖（仅requests/pandas，无需Tushare）
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas python-dotenv

      # 配置环境变量
      - name: Set environment variables
        env:
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          HOLD_STOCK_LIST: ${{ secrets.HOLD_STOCK_LIST }}
        run: |
          echo "WECHAT_WEBHOOK_URL=$WECHAT_WEBHOOK_URL" >> $GITHUB_ENV
          echo "HOLD_STOCK_LIST=$HOLD_STOCK_LIST" >> $GITHUB_ENV

      # 运行监控程序
      - name: Run stock monitoring script
        run: |
          python main.py
          sleep 28800  # 8小时后自动结束

      # 输出日志（方便排查）
      - name: Show runtime logs
        if: always()
        run: |
          echo "Stock monitor workflow finished (DFCF version)"
