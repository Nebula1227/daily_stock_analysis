name: 短线交易三模块分析（早盘+持仓+尾盘）

on:
  schedule:
    - cron: "28 1 * * 1-5"  # 早盘 9:28
    - cron: "30 2 * * 1-5"  # 持仓 10:30
    - cron: "50 6 * * 1-5"  # 尾盘 14:50
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      HOLD_STOCK_LIST: ${{ secrets.HOLD_STOCK_LIST }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install requests pandas

      - name: 运行三模块分析
        run: python main.py

      - name: 上传报告
        uses: actions/upload-artifact@v4
        with:
          name: 短线交易报告-${{ github.run_number }}
          path: reports/
          retention-days: 30
