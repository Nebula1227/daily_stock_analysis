name: Daily Stock Analysis

on:
  # 定时触发（早盘9:27、尾盘14:52，覆盖全场景分析）
  schedule:
    - cron: '27 1 * * 1-5'  # 北京时间9:27 → 执行早盘+持仓分析
    - cron: '52 6 * * 1-5'  # 北京时间14:52 → 执行尾盘+持仓分析
  # 手动触发（可随时执行全量分析）
  workflow_dispatch:

jobs:
  stock-analysis-job:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      HOLD_STOCK_LIST: ${{ secrets.HOLD_STOCK_LIST }}
      WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}

    steps:
      - name: 1. 拉取代码仓库
        uses: actions/checkout@v4

      - name: 2. 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 3. 安装依赖（含Tushare）
        run: |
          pip install --upgrade pip
          pip install requests pandas tushare

      - name: 4. 执行核心分析（含早盘+持仓+尾盘）
        run: |
          echo "开始执行：早盘分析 → 持仓分析 → 尾盘分析"
          python main.py  # 这一步会完整运行所有分析逻辑

      - name: 5. 上传分析报告（含持仓分析结果）
        uses: actions/upload-artifact@v4
        with:
          name: stock-analysis-report
          path: reports/
          retention-days: 7
